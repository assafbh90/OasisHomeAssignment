# IdentityHub full stack: frontend (SPA + proxy) -> backend (API) -> postgres + redis.
# Migrations run once as the superuser; the backend connects as the
# least-privilege app role so RLS applies. Reads secrets from .env.
name: identityhub

# Shared environment for the Go services (backend + the one-shot seed). BOTH load
# the same config, so both need the derived OAuth callback URL — otherwise the
# service that lacks it fails config validation ("jira.redirect_uri is required").
# PUBLIC_HOST is the full public authority (host[:port]); it defaults to
# localhost:${FRONTEND_PORT} so local dev tracks the published port automatically,
# while prod can set a bare domain (no stray :port). Set JIRA_REDIRECT_URI to
# fully override the scheme/path too (e.g. an https custom domain).
x-app-env: &app-env
  POSTGRES_HOST: postgres
  REDIS_ADDR: redis:6379
  # Mandatory secrets/identifiers the Go services need. ${VAR:?msg} aborts
  # `docker compose up` BEFORE any container starts if a value is unset/empty.
  POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER (app DB role) is required}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required and must equal APP_DB_PASSWORD}"
  POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
  REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
  CRYPTO_TOKEN_KEY: "${CRYPTO_TOKEN_KEY:?CRYPTO_TOKEN_KEY is required - generate with openssl rand -base64 32}"
  JIRA_REDIRECT_URI: "${JIRA_REDIRECT_URI:-http://${PUBLIC_HOST:-localhost:${FRONTEND_PORT:-3000}}/v1/integrations/jira/callback}"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      # ${VAR:?msg} makes `docker compose up` abort BEFORE starting anything if the
      # variable is unset/empty (copy .env.example to .env and fill these in).
      POSTGRES_USER: "${PG_SUPERUSER:?PG_SUPERUSER is required - copy .env.example to .env}"
      POSTGRES_PASSWORD: "${PG_SUPERUSER_PASSWORD:?PG_SUPERUSER_PASSWORD is required}"
      POSTGRES_DB: "${PG_DB:?PG_DB is required}"
      APP_DB_PASSWORD: "${APP_DB_PASSWORD:?APP_DB_PASSWORD is required (password for the app DB role)}"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deployments/docker/postgres-initdb.sh:/docker-entrypoint-initdb.d/10-app-role.sh:ro
    healthcheck:
      # Use the env vars the postgres image actually sets inside the container
      # (POSTGRES_USER/POSTGRES_DB), not the compose-only PG_* names.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [ihnet]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [ihnet]

  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://${PG_SUPERUSER}:${PG_SUPERUSER_PASSWORD}@postgres:5432/${PG_DB}?sslmode=disable"
      - "up"
    restart: "no"
    networks: [ihnet]

  backend:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
    env_file: [.env]
    environment:
      <<: *app-env
      # pprof bound to all interfaces inside the container network only (not published).
      PPROF_ADDR: 0.0.0.0:6060
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [ihnet]

  # One-shot demo seeding (idempotent). Creates the acme org + a demo user.
  seed:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
    command: ["seed"]
    env_file: [.env]
    environment:
      <<: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"
    networks: [ihnet]

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_HOST: backend:8080
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks: [ihnet]

  ollama:
    build:
      context: .
      dockerfile: deployments/docker/ollama.Dockerfile
      args:
        MODEL: "${OLLAMA_MODEL:-qwen2.5:0.5b}"
    # Memory cap: qwen2.5:0.5b is tiny; bound it so it can't balloon the host.
    mem_limit: "${OLLAMA_MEM_LIMIT:-1500m}"
    deploy:
      resources:
        limits:
          memory: "${OLLAMA_MEM_LIMIT:-1500m}"
    volumes:
      - ollamadata:/root/.ollama
    networks: [ihnet]

  # Automation worker: same image as the backend, runs the `scheduler` subcommand.
  scheduler:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
    command: ["scheduler"]
    env_file: [.env]
    environment:
      <<: *app-env
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://ollama:11434}"
    mem_limit: "${SCHEDULER_MEM_LIMIT:-256m}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      ollama:
        condition: service_started
    networks: [ihnet]

volumes:
  pgdata:
  redisdata:
  ollamadata:

networks:
  ihnet:
