basePath: /
definitions:
  http.automationRequest:
    properties:
      enabled:
        type: boolean
      interval_seconds:
        type: integer
      name:
        type: string
      project_key:
        type: string
      site_url:
        type: string
    type: object
  http.automationResponse:
    properties:
      created_at:
        type: string
      enabled:
        type: boolean
      id:
        type: string
      interval_seconds:
        type: integer
      last_error:
        type: string
      last_run_at:
        type: string
      name:
        type: string
      next_scan_at:
        type: string
      project_key:
        type: string
      provider:
        type: string
      site_url:
        type: string
      status:
        type: string
    type: object
  http.connectionResponse:
    properties:
      connected:
        type: boolean
      provider:
        type: string
      scopes:
        items:
          type: string
        type: array
      status:
        type: string
    type: object
  http.errorResponse:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  http.identityResponse:
    properties:
      auth_method:
        type: string
      scopes:
        items:
          type: string
        type: array
      tenant_id:
        type: string
      user_id:
        type: string
    type: object
  http.issueTokenRequest:
    properties:
      expires_at:
        type: string
      name:
        type: string
      scopes:
        items:
          type: string
        type: array
    type: object
  http.issuedTokenResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: string
      name:
        type: string
      prefix:
        type: string
      scopes:
        items:
          type: string
        type: array
      token:
        description: plaintext, shown once
        type: string
    type: object
  http.projectResponse:
    properties:
      key:
        type: string
      name:
        type: string
    type: object
  http.recentTicketResponse:
    properties:
      created_at:
        type: string
      issue_key:
        type: string
      project_key:
        type: string
      title:
        type: string
      url:
        type: string
    type: object
  http.ticketRequest:
    properties:
      description:
        type: string
      labels:
        items:
          type: string
        type: array
      project_key:
        type: string
      title:
        type: string
    type: object
  http.ticketResponse:
    properties:
      issue_key:
        type: string
      provider:
        type: string
      url:
        type: string
    type: object
  http.tokenMetaResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: string
      last_used_at:
        type: string
      name:
        type: string
      prefix:
        type: string
      revoked_at:
        type: string
      scopes:
        items:
          type: string
        type: array
    type: object
info:
  contact: {}
  description: |-
    Multi-tenant API to connect a Jira Cloud workspace (OAuth 3LO)
    and file NHI finding tickets — from the UI and from a REST API
    guarded by a machine API key.
  title: IdentityHub API
  version: "1.0"
paths:
  /healthz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Liveness probe
      tags:
      - ops
  /readyz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties: true
            type: object
      summary: Readiness probe (Postgres + Redis)
      tags:
      - ops
  /v1/auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.identityResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.errorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Current identity
      tags:
      - auth
  /v1/automations:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/http.automationResponse'
              type: array
            type: object
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: List automations (blog-digest watchers)
      tags:
      - automations
    post:
      consumes:
      - application/json
      parameters:
      - description: Automation
        in: body
        name: automation
        required: true
        schema:
          $ref: '#/definitions/http.automationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/http.automationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.errorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Create an automation
      tags:
      - automations
  /v1/automations/{id}:
    delete:
      parameters:
      - description: Automation ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.errorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Delete an automation (and clear its seen-set)
      tags:
      - automations
    get:
      parameters:
      - description: Automation ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.automationResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.errorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Get an automation
      tags:
      - automations
    put:
      consumes:
      - application/json
      parameters:
      - description: Automation ID
        in: path
        name: id
        required: true
        type: string
      - description: Automation
        in: body
        name: automation
        required: true
        schema:
          $ref: '#/definitions/http.automationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.automationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.errorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Update an automation (full replacement)
      tags:
      - automations
  /v1/automations/{id}/run:
    post:
      parameters:
      - description: Automation ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "202":
          description: Accepted
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.errorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Run an automation now (schedule on the next tick)
      tags:
      - automations
  /v1/integrations:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/http.connectionResponse'
              type: array
            type: object
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: List integrations (connection status)
      tags:
      - integrations
  /v1/integrations/{provider}:
    delete:
      parameters:
      - default: jira
        description: Provider
        in: path
        name: provider
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http.errorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Disconnect the integration
      tags:
      - integrations
  /v1/integrations/{provider}/projects:
    get:
      parameters:
      - default: jira
        description: Provider
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/http.projectResponse'
              type: array
            type: object
        "409":
          description: reauth_required
          schema:
            $ref: '#/definitions/http.errorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: List Jira projects (project picker)
      tags:
      - integrations
  /v1/integrations/{provider}/reconcile:
    post:
      parameters:
      - default: jira
        description: Provider
        in: path
        name: provider
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "409":
          description: reauth_required
          schema:
            $ref: '#/definitions/http.errorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Reconcile the ticket cache from Jira (drift refresh)
      tags:
      - integrations
  /v1/integrations/{provider}/status:
    get:
      parameters:
      - default: jira
        description: Provider
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.connectionResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Connection status
      tags:
      - integrations
  /v1/integrations/{provider}/tickets:
    get:
      parameters:
      - default: jira
        description: Provider
        in: path
        name: provider
        required: true
        type: string
      - description: Project key
        in: query
        name: project
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/http.recentTicketResponse'
              type: array
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.errorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Recent IdentityHub tickets (cached)
      tags:
      - integrations
    post:
      consumes:
      - application/json
      parameters:
      - default: jira
        description: Provider
        in: path
        name: provider
        required: true
        type: string
      - description: Finding
        in: body
        name: ticket
        required: true
        schema:
          $ref: '#/definitions/http.ticketRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/http.ticketResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http.errorResponse'
        "409":
          description: reauth_required
          schema:
            $ref: '#/definitions/http.errorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Create an NHI finding ticket (tagged identityhub)
      tags:
      - integrations
  /v1/tokens:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/http.tokenMetaResponse'
              type: array
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.errorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: List API keys (metadata only)
      tags:
      - api-keys
    post:
      consumes:
      - application/json
      parameters:
      - description: Key name, scopes, optional expiry
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.issueTokenRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/http.issuedTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.errorResponse'
      security:
      - CookieAuth: []
      summary: Issue an API key (plaintext shown once)
      tags:
      - api-keys
  /v1/tokens/{id}:
    delete:
      parameters:
      - description: Token ID (UUID)
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.errorResponse'
      security:
      - CookieAuth: []
      - BearerAuth: []
      summary: Revoke an API key
      tags:
      - api-keys
securityDefinitions:
  BearerAuth:
    description: Machine API key as "Bearer ih_pat_…" (issue one via POST /v1/tokens).
    in: header
    name: Authorization
    type: apiKey
  CookieAuth:
    description: Interactive session cookie (set by POST /v1/auth/login).
    in: cookie
    name: ih_session
    type: apiKey
swagger: "2.0"
