# nginx serves the built SPA and reverse-proxies API calls to the backend, so the
# browser stays same-origin and session cookies work without CORS. The backend
# host is injected at container start (see Dockerfile entrypoint).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: serve index.html for any non-file path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy the API + health endpoints to the backend service.
    location ~ ^/(v1|healthz|readyz) {
        proxy_pass http://${BACKEND_HOST};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
